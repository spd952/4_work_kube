apiVersion: v1
kind: Service
metadata:
  name: my-app-service
spec:
  selector:
    app: my-app
  ports:
  - protocol: TCP
    port: 80        # Порт, который будет слушать сервис
    targetPort: 80  # Порт, на который перенаправлять трафик внутри подов
  type: NodePort    # Делает сервис доступным извне
